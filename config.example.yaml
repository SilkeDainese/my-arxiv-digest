# ═══════════════════════════════════════════════════════════
#  arXiv Digest — Configuration
#  Generated by the setup wizard
#  or fill in manually. Changes take effect on the next run.
# ═══════════════════════════════════════════════════════════

# ── Your Profile ───────────────────────────────
digest_name: "arXiv Digest"        # email subject line
researcher_name: "Your Name"       # appears in email header

# Describe your research — this is what the AI uses to score papers.
# Write 3-5 sentences about your work, like you'd tell a colleague.
research_context: |
  I study exoplanet atmospheres using transmission spectroscopy
  with JWST and ground-based instruments. I focus on hot Jupiters
  and sub-Neptunes, particularly their atmospheric composition
  and cloud properties.

# ── arXiv Categories ───────────────────────────
# Which arXiv categories to monitor. Common ones:
#   astro-ph.EP (exoplanets)    astro-ph.SR (stars)
#   astro-ph.GA (galaxies)      astro-ph.CO (cosmology)
#   astro-ph.HE (high energy)   astro-ph.IM (instrumentation)
categories:
  - astro-ph.EP

# ── Keywords (word → weight 1-10) ──────────────
# Higher weight = more important to you. Papers matching these
# get pre-filtered before AI scoring. The setup wizard generates these.
keywords:
  transmission spectroscopy: 10
  hot Jupiter atmosphere: 9
  JWST: 7
  sub-Neptune: 7
  atmospheric retrieval: 8
  cloud properties: 6

# Optional: add synonym / alias phrases for brittle terminology.
# The digest already does fuzzy matching for close variants (plural, hyphenation,
# "planet" vs "planetary"), but you can pin manual aliases here too.
# keyword_aliases:
#   hot Jupiter atmosphere:
#     - hot Jupiter atmospheres
#     - giant planet atmosphere
#   JWST:
#     - James Webb Space Telescope

# ── Your Author Name ──────────────────────────
# How YOUR name appears in arXiv author lists.
# If you publish a paper, it gets a special celebration section!
self_match:
  - "Smith, J"
  - "Jane Smith"

# ── Research Authors ───────────────────────────
# Papers by these people get a relevance boost in AI scoring.
# Use partial name strings (matched case-insensitively).
research_authors:
  - Madhusudhan

# ── Colleagues ─────────────────────────────────
# Papers by colleagues always appear, even if off-topic.
# Great for staying social and sending congrats!
colleagues:
  people:
    - name: Jane Smith
      match: ["Smith, J"]
      # Optional note shown in the digest for tracked people
      note: "Teaches Stars and planets"
  institutions:
    - Aarhus University

# ── Digest Mode ────────────────────────────────
# "highlights" — only the best papers, higher threshold (default)
# "in_depth"   — wider net, more papers, lower threshold
digest_mode: "highlights"

# ── Recipient Email View ───────────────────────
# "deep_read"  — full cards with expanded context (default)
# "5_min_skim" — top 3 papers with one-line summaries
recipient_view_mode: "deep_read"

# ── Settings ───────────────────────────────────
days_back: 4          # how many days to look back (4 covers weekend gaps)
# max_papers and min_score are auto-set by digest_mode, but you can override:
# max_papers: 8       # max papers in the main digest (highlights=6, in_depth=15)
# min_score: 3        # minimum AI relevance score 1-10 (highlights=5, in_depth=2)

# ── Schedule (metadata only) ─────────────────
# These fields are NOT used at runtime — digest.py ignores them.
# They record your setup wizard choices. The actual schedule is set by
# the cron expression in .github/workflows/digest.yml.
# To change the schedule, edit that file directly.
schedule: "mon_wed_fri"  # "daily", "mon_wed_fri", or "weekly"
send_hour_utc: 7         # 7 = 9am Danish time (CET), 8 = 9am (CEST summer)

# ── Personalization (optional) ─────────────────
institution: ""          # shown in email footer
department: ""           # shown in email footer
tagline: ""              # optional footer quote

# ── Email Settings ─────────────────────────────
# Optional fallback if you do not want to store RECIPIENT_EMAIL as a repo secret.
# recipient_email: "student@example.com"
# Default: Gmail. For Outlook/Office 365, use smtp.office365.com
smtp_server: "smtp.gmail.com"
smtp_port: 587

# ── Advanced (optional) ──────────────────────
# claude_model: "claude-sonnet-4-20250514"  # pin a specific Claude model version
# own_api_key: true   # set to true once you add your own GEMINI_API_KEY or ANTHROPIC_API_KEY

# ── Your Repository ───────────────────────────
# Used for self-service links in emails (edit config, pause digest).
# GitHub Actions auto-detects the current repo, so this mainly matters for local previews/manual runs.
github_repo: ""          # Your fork's path, e.g. "janedoe/arxiv-digest" — enables self-service links in emails

# Optional: override the "Re-run setup wizard" link in the email footer.
# setup_url: "https://arxiv-digest-production-93ba.up.railway.app"
