name: arXiv Digest

on:
  schedule:
    - cron: '0 7 * * 1,3,5'  # Mon/Wed/Fri at 07:00 UTC (9am Danish time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets
        run: |
          if [ ! -f config.yaml ]; then echo "❌ config.yaml is missing. Upload your generated config.yaml to the repo before running the digest."; exit 1; fi
          if [ -z "$RECIPIENT_EMAIL" ]; then echo "❌ RECIPIENT_EMAIL is not set!"; exit 1; fi
          echo "✅ RECIPIENT_EMAIL configured (comma-separated lists are supported)"
          # SMTP credentials: support both new (SMTP_*) and legacy (GMAIL_*) names
          SMTP_U="${SMTP_USER:-$GMAIL_USER}"
          SMTP_P="${SMTP_PASSWORD:-$GMAIL_APP_PASSWORD}"
          if [ -z "$SMTP_U" ]; then echo "❌ SMTP_USER (or GMAIL_USER) is not set!"; exit 1; fi
          if [ -z "$SMTP_P" ]; then echo "❌ SMTP_PASSWORD (or GMAIL_APP_PASSWORD) is not set!"; exit 1; fi
          # Validate smtp_server from config.yaml (basic hostname check)
          SMTP_HOST=$(python -c "import yaml; c=yaml.safe_load(open('config.yaml')); print(c.get('smtp_server','smtp.gmail.com'))" 2>/dev/null || echo "smtp.gmail.com")
          if ! echo "$SMTP_HOST" | grep -qE '^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$'; then
            echo "⚠️  smtp_server '$SMTP_HOST' looks invalid — check config.yaml"
          else
            echo "✅ SMTP server: $SMTP_HOST"
          fi
          # AI keys are optional — digest falls back to keyword-only scoring
          if [ -n "$ANTHROPIC_API_KEY" ]; then echo "✅ Claude API key found"; fi
          if [ -n "$GEMINI_API_KEY" ]; then echo "✅ Gemini API key found"; fi
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then echo "⚠️  No AI API key — using keyword-only scoring"; fi
          echo "✅ Required secrets present"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python digest.py

      - name: Commit keyword stats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f keyword_stats.json ] && git add keyword_stats.json || true
          [ -f feedback_stats.json ] && git add feedback_stats.json || true
          git diff --cached --quiet || git commit -m "📊 Update digest stats [skip ci]"
          git pull --rebase || true
          git push || true

      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: digest-html
          path: |
            digest_output.html
            keyword_stats.json
            feedback_stats.json
          if-no-files-found: ignore
