name: AU Student Digest

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      preview:
        description: Render HTML previews instead of sending emails
        required: false
        type: boolean
        default: false
      recipient:
        description: Optional single student email to process
        required: false
        type: string
      limit:
        description: Optional max number of students to process
        required: false
        type: string

permissions:
  contents: read

jobs:
  send-student-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send AU student digests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RELAY_TOKEN: ${{ secrets.DIGEST_RELAY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STUDENT_ADMIN_TOKEN: ${{ secrets.STUDENT_ADMIN_TOKEN }}
          STUDENT_MANAGE_URL: ${{ vars.STUDENT_MANAGE_URL }}
          STUDENT_REGISTRY_URL: ${{ vars.STUDENT_REGISTRY_URL }}
          WORKFLOW_DISPATCH_PREVIEW: ${{ inputs.preview }}
          WORKFLOW_DISPATCH_RECIPIENT: ${{ inputs.recipient }}
          WORKFLOW_DISPATCH_LIMIT: ${{ inputs.limit }}
        run: |
          if [ -z "$STUDENT_ADMIN_TOKEN" ]; then
            echo "No STUDENT_ADMIN_TOKEN configured; skipping AU student digests."
            exit 0
          fi
          cmd=(python student_digest.py)
          if [ "$WORKFLOW_DISPATCH_PREVIEW" = "true" ]; then
            cmd+=(--preview --preview-dir student_previews)
          fi
          if [ -n "$WORKFLOW_DISPATCH_RECIPIENT" ]; then
            cmd+=(--recipient "$WORKFLOW_DISPATCH_RECIPIENT")
          fi
          if [ -n "$WORKFLOW_DISPATCH_LIMIT" ]; then
            cmd+=(--limit "$WORKFLOW_DISPATCH_LIMIT")
          fi
          "${cmd[@]}"

      - name: Upload preview artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.preview }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: student-previews
          path: student_previews/

      - name: Write run summary
        if: always()
        run: |
          echo "### 🔭 Student Digest Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: student-digest" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.preview }}" = "true" ]; then
            echo "- Mode: preview" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Mode: send" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Report failure
        if: failure()
        continue-on-error: true
        run: |
          if [ -n "$DIGEST_RELAY_URL" ]; then
            curl -s -X POST "${DIGEST_RELAY_URL}/api/report" \
              -H "Content-Type: application/json" \
              -d '{
                "repo": "${{ github.repository }}",
                "run_id": "${{ github.run_id }}",
                "error": "Student digest workflow failed — check logs",
                "workflow": "student-digest",
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }'
          fi
        env:
          DIGEST_RELAY_URL: ${{ vars.DIGEST_RELAY_URL }}
