name: Student Digest Preview

on:
  schedule:
    - cron: '0 19 * * 0'  # Sunday 19:00 UTC (21:00 Danish time)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Sunday preview
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RELAY_TOKEN: ${{ secrets.DIGEST_RELAY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          STUDENT_ADMIN_TOKEN: ${{ secrets.STUDENT_ADMIN_TOKEN }}
          STUDENT_TOKEN_SECRET: ${{ secrets.STUDENT_TOKEN_SECRET }}
          STUDENT_MANAGE_URL: ${{ vars.STUDENT_MANAGE_URL }}
          STUDENT_REGISTRY_URL: ${{ vars.STUDENT_REGISTRY_URL }}
        run: python student_digest.py --send-preview
