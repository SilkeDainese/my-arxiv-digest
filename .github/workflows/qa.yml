name: QA

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install digest dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

      - name: Compile Python entrypoints
        run: python -m py_compile digest.py setup/app.py setup/pure_scraper.py brand.py

      - name: Install setup wizard dependencies
        run: pip install -r setup/requirements.txt

      - name: Smoke test setup wizard startup
        run: |
          timeout 20s streamlit run setup/app.py --server.headless true --server.port 8501 > /tmp/streamlit.log 2>&1 || test $? -eq 124
          ! grep -q "Traceback" /tmp/streamlit.log
          grep -q "Local URL" /tmp/streamlit.log
